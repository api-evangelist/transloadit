apis:
- name: Transloadit API
  description: Core REST API for creating and managing Assemblies (processing jobs),
    Templates, Template Credentials, Webhooks, Billing, and Queue monitoring. Uses
    bearer token authentication. Supports video encoding, image manipulation, audio
    processing, document conversion, and AI-based media tasks via 94 Robots.
