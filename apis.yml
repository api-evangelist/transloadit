aid: transloadit
name: Transloadit
description: File processing and media handling API for encoding video, resizing images,
  extracting audio, generating thumbnails, and transcribing media via assembly instructions.
  Supports 94 robots for automation, browser-based uploads via Uppy, Smart CDN, and
  integrations with S3, Google Drive, and more.
